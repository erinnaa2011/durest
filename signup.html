
<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Welcome to DuRest</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-main d-flex flex-column min-vh-100">
    <div class="container my-auto py-5">
        <div class="row justify-content-center">
            <div class="col-12 col-md-8 col-lg-5">
                <div class="auth-card p-4 p-md-5">
                    <div class="text-center mb-4">
                        <i class="fa fa-user-plus fa-2x text-orange mb-3"></i>
                        <h2 class="text-white">Create Your Account</h2>
                        <p class="text-secondary">Join DuRest to Book a Table</p>
                    </div>

                    <form id="signupForm">
                        <label for="fullName" class="form-label text-secondary">Full Name</label>
                        <div class="input-group mb-3">
                            <span class="input-group-text" style="background-color: #383838; border-color: #555; color: #ccc;">
                                <i class="fa-solid fa-user"></i>
                            </span>
                            <input type="text" class="form-control input-bg text-white">
                        </div>

                        <label for="" class="form-label">Password</label>
                        <div class="input-group mb-3">
                            <span class="input-group-text" style="background-color: #383838; border-color: #555; color: #ccc;">
                              <i class="fa-solid fa-user"></i>
                            </span>
                            <input type="password" class="form-control input-bg text-white">
                        </div>

                        <label for="" class="form-label">Confirm Password</label>
                        <div class="input-group mb-3">
                            <span class="input-group-text" style="background-color: #383838; border-color: #555; color: #ccc;">
                              <i class="fa-solid fa-user"></i>
                            </span>
                            <input type="password" class="form-control input-bg text-white">
                        </div>
                         <button class="btn bg-orange text-white w-100 rounded-pill py-2 fw-bold" type="submit">Create Account <i class="fa fa-arrow-right ms-1"></i></button>


             
                    </form>
                       <p class="text-secondary text-sm mt-4">
                        alredy have an account? <a href="login.html"></a>
                    </p>
                </div>
         
            </div>

        </div>

    </div>
     



      <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
